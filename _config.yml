# about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
  Hi, my name's Pedro and i am a Fulltime developer at Oath tentacles, i have experience making software for minecraft servers. I have already worked at many servers gaining teamwork and leadership skills.

  I am most skilled in: <mark>Multi-Threading</mark> and <mark>Minigames Frameworks</mark>

content:
