    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: Resume Projects
        link: github.com/PedroMPagani
        # link_text: Project Website
        additional_links:
          - title: Resume Projects
            icon: fab fa-github
            url: github.com/PedroMPagani/Resume
