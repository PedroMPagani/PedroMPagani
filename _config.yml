        quote: >
          When coding you are basically dreaming, the fact that you can write words and turn ideas into reality inspiree every kid, you don't even need to teach them.
        description: | # this will include new lines to allow paragraphs
          I started this project as a way if learning <mark>Spigot/Bukkit</mark> and it went well. I have learned many skills through this and been I'm very proud of having this in my portfolio. If you don't have a project as awesome as this I would advise you make one.

